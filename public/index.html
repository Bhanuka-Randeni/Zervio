<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartDine POS</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="app.js" defer></script>
</head>
<body>
    <header class="app-header">
        <div class="logo">SmartDine</div>
        <div id="user-info" class="user-info">
            <span id="role-badge" class="badge">Guest</span>
            <button id="logout-btn" class="hidden">Logout</button>
        </div>
    </header>

    <main id="app-container">
        
        <section id="view-login" class="view active">
            <h2>Staff Login</h2>
            <form id="login-form">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="btn-primary">Login</button>
            </form>
            <p id="login-error" class="error-msg"></p>
        </section>

        <section id="view-customer" class="view hidden">
            <div id="table-info" class="sticky-banner">Table: <span id="current-table">Scan QR</span></div>
            
            <div class="menu-filters">
                </div>

            <div id="menu-grid" class="grid">
                </div>

            <button id="fab-cart" class="fab">🛒 <span id="cart-count">0</span></button>
        </section>

        <section id="view-kitchen" class="view hidden">
            <h2>Kitchen Display System</h2>
            <div id="kitchen-orders" class="board">
                </div>
        </section>

        <section id="view-waiter" class="view hidden">
            <h2>Ready to Serve</h2>
            <div id="waiter-tasks" class="task-list">
                </div>
        </section>

    </main>

    <dialog id="cart-modal" class="modal">
        <div class="modal-content">
            <h3>Your Order</h3>
            <div id="cart-items"></div>
            <div class="cart-total">Total: $<span id="total-price">0.00</span></div>
            
            <label for="payment-method">Payment Method:</label>
            <select id="payment-method">
                <option value="cash">Cash (Pay at Counter)</option>
                <option value="card">Online Card</option>
                <option value="slip">Upload Slip</option>
            </select>
            
            <div class="modal-actions">
                <button id="close-cart" class="btn-secondary">Close</button>
                <button id="place-order" class="btn-primary">Place Order</button>
            </div>
        </div>
    </dialog>
</body>
</html>
