<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu & Order</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="dynamic-bg" style="min-height: 100vh; background-size: cover; background-position: center; background-attachment: fixed; transition: background-image 0.5s ease-in-out;">
        
        <div class="navbar" style="background: rgba(31, 41, 55, 0.9); backdrop-filter: blur(5px);">
            <h1 id="shop-title">Loading Menu...</h1>
            <div><span class="badge badge-success" id="table-display" style="font-size: 1.1rem; padding: 0.5rem 1rem;">Table: --</span></div>
        </div>

        <div class="container" style="padding-top: 2rem;">
            <div style="background:rgba(255,255,255,0.95); padding:1rem; border-radius:8px; margin-bottom:1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                    <div>
                        <strong>⏱️ Est. Kitchen Prep Time: </strong><span id="prep-time" style="color: var(--primary); font-weight: bold;">--</span>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-warning" onclick="summonWaiter()">🔔 Summon Waiter</button>
                        <button class="btn btn-success" onclick="requestBill()">💵 Request Bill</button>
                    </div>
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-bottom:1.5rem; overflow-x:auto; padding-bottom:10px; white-space: nowrap;" id="category-bar">
                </div>

            <h2 style="color: white; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); background: rgba(0,0,0,0.5); display: inline-block; padding: 5px 15px; border-radius: 4px;">Our Menu</h2>
            <div class="grid" id="menu-grid">
                </div>

            <hr style="border-color: rgba(255,255,255,0.3); margin: 2rem 0;">

            <h2 style="color: white; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); background: rgba(0,0,0,0.5); display: inline-block; padding: 5px 15px; border-radius: 4px;">Your Order Bucket</h2>
            <div class="card" id="cart-card" style="background:rgba(255,255,255,0.95); margin-bottom: 3rem;">
                <div id="cart-items" style="min-height: 50px;">Your bucket is empty.</div>
                <div style="margin-top:1rem; font-size:1.4rem; font-weight:bold; text-align: right; color: var(--primary);" id="cart-total">Total: $0.00</div>
                <button class="btn btn-success" style="width:100%; margin-top:1rem; padding: 1rem; font-size: 1.1rem;" onclick="placeOrder()">🚀 Click to Order Selections</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Grab the table number from the URL (e.g., ?table=T1)
        const urlParams = new URLSearchParams(window.location.search);
        const tableNumber = urlParams.get('table') || 'T1';
        
        let cart = [];
        let menuData = [];

        // Display current table number
        document.getElementById('table-display').innerText = `Table: ${tableNumber}`;

        // 2. Main data fetching function
        async function loadData() {
            try {
                // Fetch shop config and prep time
                const configRes = await fetch('/api/config');
                const configData = await configRes.json();
                
                document.getElementById('shop-title').innerText = configData.config.shopName;
                if(configData.config.backgroundImage) {
                    // This works seamlessly with both local file paths and external web URLs
                    document.getElementById('dynamic-bg').style.backgroundImage = `url('${configData.config.backgroundImage}')`;
                }
                document.getElementById('prep-time').innerText = configData.prepTimeEstimate;

                // Render Category Filters
                let catBar = document.getElementById('category-bar');
                catBar.innerHTML = `<button class="btn btn-primary" onclick="filterMenu('All')">All</button>`;
                configData.categories.forEach(cat => {
                    catBar.innerHTML += `<button class="btn btn-dark" style="background: #374151; color: white;" onclick="filterMenu('${cat}')">${cat}</button>`;
                });

                // Fetch and Render Menu
                const menuRes = await fetch('/api/menu');
                menuData = await menuRes.json();
                renderMenu(menuData);
            } catch (error) {
                console.error("Failed to load restaurant data:", error);
            }
        }

        // 3. Render Food Items
        function renderMenu(items) {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            
            if(items.length === 0) {
                grid.innerHTML = `<div style="background: white; padding: 1rem; border-radius: 4px;">No items available in this category.</div>`;
                return;
            }

            items.forEach(item => {
                let stockWarning = item.stock < 5 ? `<span class="badge badge-danger">Only ${item.stock} LEFT</span>` : '';
                let isOutOfStock = item.stock <= 0;
                let ratingDisplay = '★'.repeat(Math.round(item.rating)) + '☆'.repeat(5 - Math.round(item.rating));
                
                grid.innerHTML += `
                    <div class="card" style="background:rgba(255,255,255,0.95); opacity: ${isOutOfStock ? '0.6' : '1'}; position: relative;">
                        <img src="${item.image}" style="width:100%; height:200px; object-fit:cover; border-radius:4px; margin-bottom: 10px;">
                        
                        <h3 style="margin-top: 0;">${item.name} ${stockWarning}</h3>
                        <p style="margin: 5px 0;">Category: ${item.category} | <strong style="color: var(--success); font-size: 1.1rem;">$${item.price.toFixed(2)}</strong></p>
                        
                        <div style="margin-bottom: 15px; background: #fef3c7; padding: 5px; border-radius: 4px; display: inline-block;">
                            <span class="star-rating">${ratingDisplay}</span> 
                            <small>(${item.rating || 0}/5)</small>
                            <select style="margin-left: 10px; border: none; background: transparent; cursor: pointer; font-size: 0.8rem;" onchange="rateItem(${item.id}, this.value); this.value=''">
                                <option value="">Rate...</option>
                                <option value="5">5 Stars</option>
                                <option value="4">4 Stars</option>
                                <option value="3">3 Stars</option>
                                <option value="2">2 Stars</option>
                                <option value="1">1 Star</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <input type="text" placeholder="Special Notes (Spicy, Veg, No Onion...)" id="note-${item.id}" ${isOutOfStock ? 'disabled' : ''}>
                        </div>
                        
                        <button class="btn btn-primary" style="width: 100%;" onclick="addToCart(${item.id})" ${isOutOfStock ? 'disabled' : ''}>
                            ${isOutOfStock ? 'Out of Stock' : 'Add to Bucket'}
                        </button>
                    </div>
                `;
            });
        }

        // 4. Filter by Category
        function filterMenu(category) {
            if(category === 'All') {
                renderMenu(menuData);
            } else {
                renderMenu(menuData.filter(m => m.category === category));
            }
        }

        // 5. Add to Bucket Functionality
        function addToCart(id) {
            const item = menuData.find(m => m.id === id);
            if(!item) return;

            const note = document.getElementById(`note-${id}`).value.trim();
            const existing = cart.find(c => c.id === id && c.note === note);
            
            // Check stock limitations locally before sending to server
            let currentCartQty = existing ? existing.qty : 0;
            if (currentCartQty >= item.stock) {
                alert(`Cannot add more. Only ${item.stock} available in stock.`);
                return;
            }

            if(existing) {
                existing.qty++;
            } else {
                cart.push({ id: item.id, name: item.name, price: item.price, qty: 1, note: note });
            }
            
            document.getElementById(`note-${id}`).value = ''; // Clear note field after adding
            renderCart();
            
            // Visual feedback
            const cartElement = document.getElementById('cart-card');
            cartElement.scrollIntoView({ behavior: 'smooth' });
        }

        // 6. Update Bucket Display
        function renderCart() {
            const container = document.getElementById('cart-items');
            if(cart.length === 0) {
                container.innerHTML = "Your bucket is empty.";
                document.getElementById('cart-total').innerText = "Total: $0.00";
                return;
            }
            
            container.innerHTML = '';
            let total = 0;
            
            cart.forEach((c, index) => {
                total += (c.price * c.qty);
                container.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom:10px; border-bottom:1px solid #ddd; padding-bottom:10px;">
                        <div style="flex-grow: 1;">
                            <strong style="font-size: 1.1rem;">${c.name} (x${c.qty})</strong><br>
                            ${c.note ? `<small style="color:var(--warning); font-weight: bold;">Note: ${c.note}</small>` : ''}
                        </div>
                        <div style="font-weight: bold; font-size: 1.1rem; min-width: 80px; text-align: right;">
                            $${(c.price * c.qty).toFixed(2)} 
                        </div>
                        <div style="margin-left: 15px;">
                            <button class="btn btn-danger" style="padding:4px 8px;" onclick="cart.splice(${index},1); renderCart();">X</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('cart-total').innerText = `Total: $${total.toFixed(2)}`;
        }

        // 7. Place Order to Server
        async function placeOrder() {
            if(cart.length === 0) return alert("Your bucket is empty. Add some items first!");
            
            try {
                const res = await fetch('/api/orders/place', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ table: tableNumber, items: cart })
                });
                
                const data = await res.json();
                
                if(data.success)
