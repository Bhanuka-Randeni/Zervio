<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashier Counter Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <h1>Cashier Order Verification Counter</h1>
    </div>

    <div class="container">
        <h2>Incoming Order Approval Request Queue</h2>
        <div id="pending-orders-queue"></div>

        <hr>
        <h2>Bill Generation Requests (Requires Auditory Alerts)</h2>
        <div id="bill-requests-queue"></div>
    </div>

    <script>
        // Use standard Web Audio API oscillators to guarantee execution without missing file elements
        function playAlertSound() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, context.currentTime); // A5 note
            gain.gain.setValueAtTime(0.5, context.currentTime);
            osc.connect(gain);
            gain.connect(context.destination);
            osc.start();
            osc.stop(context.currentTime + 0.3);
        }

        let knownBillRequestsCount = 0;

        async function refreshCashierPanel() {
            const res = await fetch('/api/orders');
            const orders = await res.json();
            
            const pendingContainer = document.getElementById('pending-orders-queue');
            pendingContainer.innerHTML = '';
            
            orders.filter(o => o.status === 'Pending Cashier').forEach(order => {
                let itemsList = order.items.map(i => `${i.name} x ${i.qty} (<small>${i.note || 'Plain'}</small>)`).join(', ');
                pendingContainer.innerHTML += `
                    <div class="card" style="border-left: 5px solid var(--primary);">
                        <h3>Table Reference: ${order.table} <span class="badge badge-warning">Awaiting Approval</span></h3>
                        <p><strong>Items:</strong> ${itemsList}</p>
                        <button class="btn btn-success" onclick="updateOrderStatus('${order.id}', 'Confirmed by Cashier')">Confirm & Send to Kitchen</button>
                    </div>
                `;
            });

            // Bill Requests Pipeline
            const billRes = await fetch('/api/bills');
            const bills = await billRes.json();
            
            const billContainer = document.getElementById('bill-requests-queue');
            billContainer.innerHTML = '';

            let currentActiveBills = bills.filter(b => b.status === 'Pending Cashier');
            
            if(currentActiveBills.length > knownBillRequestsCount) {
                playAlertSound();
            }
            knownBillRequestsCount = currentActiveBills.length;

            currentActiveBills.forEach(bill => {
                billContainer.innerHTML += `
                    <div class="card" style="border-left:5px solid var(--danger); background:#fff5f5;">
                        <h3>🚨 Table ${bill.table} Requests settlement bill!</h3>
                        <button class="btn btn-success" onclick="updateBillStatus('${bill.id}', 'Bill Ready')">Confirm Bill Generation & Print</button>
                    </div>
                `;
            });
        }

        async function updateOrderStatus(orderId, status) {
            await fetch('/api/orders/update-status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ orderId, status })
            });
            refreshCashierPanel();
        }

        async function updateBillStatus(id, status) {
            await fetch('/api/bills/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, status })
            });
            refreshCashierPanel();
        }

        setInterval(refreshCashierPanel, 3000);
        window.onload = refreshCashierPanel;
    </script>
</body>
</html>
