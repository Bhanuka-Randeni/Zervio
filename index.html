<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>TableDine</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --amber:#BA7517;--amber-d:#854F0B;--amber-l:#FAEEDA;--amber-m:#FAC775;
  --teal:#0F6E56;--teal-l:#E1F5EE;
  --red:#A32D2D;--red-l:#FCEBEB;
  --green:#3B6D11;--green-l:#EAF3DE;
  --blue:#185FA5;--blue-l:#E6F1FB;
  --purple:#534AB7;--purple-l:#EEEDFE;
  --bg:#FAFAF8;--bg2:#F1EFE8;--bg3:#fff;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.15);
  --text:#1a1a18;--text2:#5a5a55;--text3:#8a8a85;
  --radius:10px;--radius-lg:16px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh;overflow-x:hidden}
#app{min-height:100vh;display:flex;flex-direction:column}
.page{display:none;flex-direction:column;min-height:100vh}
.page.active{display:flex}
.topbar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;flex-shrink:0}
.topbar h1{font-size:16px;font-weight:600;flex:1}
.topbar-logo{width:32px;height:32px;border-radius:8px;background:var(--amber);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0}
.bottom-nav{display:flex;background:var(--bg3);border-top:1px solid var(--border);position:sticky;bottom:0;z-index:50}
.bottom-nav button{flex:1;padding:10px 4px 8px;border:none;background:transparent;color:var(--text3);font-size:10px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:color .15s;position:relative}
.bottom-nav button i{font-size:22px}
.bottom-nav button.active{color:var(--amber)}
.bnav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);color:#fff;border-radius:10px;font-size:9px;padding:1px 4px;min-width:16px;text-align:center;font-weight:700;display:none}
.bnav-badge.show{display:block}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px;padding-bottom:90px}
.card{background:var(--bg3);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}
.card-pad{padding:14px}
.section-label{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px}
.section-label:first-child{margin-top:0}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;line-height:1}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--amber);color:#fff;border-color:var(--amber)}
.btn-primary:hover{background:var(--amber-d)}
.btn-danger{background:var(--red-l);color:var(--red);border-color:var(--red)}
.btn-success{background:var(--green);color:#fff;border-color:var(--green)}
.btn-success:hover{background:#2a5009}
.btn-purple{background:var(--purple-l);color:var(--purple);border-color:var(--purple)}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-full{width:100%}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:12px;font-weight:500;gap:4px}
.badge-amber{background:var(--amber-l);color:var(--amber-d)}
.badge-green{background:var(--green-l);color:var(--green)}
.badge-red{background:var(--red-l);color:var(--red)}
.badge-blue{background:var(--blue-l);color:var(--blue)}
.badge-purple{background:var(--purple-l);color:var(--purple)}
.badge-gray{background:var(--bg2);color:var(--text2)}
input,textarea,select{font-family:inherit;font-size:14px;border:1px solid var(--border2);border-radius:var(--radius);padding:9px 12px;background:var(--bg3);color:var(--text);width:100%;transition:border-color .15s;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--amber)}
textarea{resize:vertical;min-height:70px}
label.form-label{font-size:13px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500}
.form-group{margin-bottom:12px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg3);border-radius:var(--radius-lg) var(--radius-lg) 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;padding:16px}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:600;margin-bottom:14px}
.modal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.qty-ctrl{display:inline-flex;align-items:center;gap:10px;background:var(--bg2);border-radius:50px;padding:3px}
.qty-ctrl button{width:30px;height:30px;border-radius:50%;border:none;background:var(--bg3);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:400;line-height:1;box-shadow:0 1px 3px var(--border)}
.qty-ctrl span{font-weight:600;min-width:22px;text-align:center;font-size:15px}
.stars{display:inline-flex;gap:2px}
.star{font-size:16px;cursor:pointer;color:#ddd;transition:color .1s}
.star.filled{color:#F59E0B}
.stars-display{display:inline-flex;gap:1px}
.stars-display .star{font-size:13px;cursor:default}
.menu-card{background:var(--bg3);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;margin-bottom:10px}
.menu-card-img{width:100%;height:130px;object-fit:cover;background:var(--bg2);display:block}
.menu-card-img-ph{width:100%;height:130px;background:var(--bg2);display:flex;align-items:center;justify-content:center}
.menu-card-body{padding:10px 12px 12px}
.order-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border)}
.order-row:last-child{border-bottom:none}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tag{padding:5px 10px;background:var(--bg2);border-radius:20px;font-size:13px;color:var(--text2);cursor:pointer;border:1px solid var(--border);transition:all .15s}
.tag.sel{background:var(--amber-l);color:var(--amber-d);border-color:var(--amber-m)}
.stat-card{background:var(--bg2);border-radius:var(--radius);padding:14px;text-align:center}
.stat-num{font-size:24px;font-weight:700}
.stat-lbl{font-size:12px;color:var(--text2);margin-top:3px}
.kitchen-card{border-radius:var(--radius-lg);border:1px solid var(--border);padding:14px;background:var(--bg3);margin-bottom:10px;border-left:4px solid var(--amber)}
.kitchen-card.ready{border-left-color:var(--green)}
.kitchen-card.served{border-left-color:var(--text3);opacity:.65}
.qr-box{background:#fff;padding:12px;border-radius:var(--radius);border:1px solid var(--border);display:inline-flex;flex-direction:column;align-items:center;gap:8px}
.o-card{border-radius:var(--radius-lg);border:1px solid var(--border);padding:14px;background:var(--bg3);margin-bottom:10px;border-left:4px solid var(--amber)}
.o-card.confirmed{border-left-color:var(--green)}
.o-card.declined{border-left-color:var(--red);opacity:.6}
.o-card.bill-req{border-left-color:var(--blue)}
.o-card.summon{border-left-color:var(--purple)}
.w-card{border-radius:var(--radius-lg);border:1px solid var(--border);padding:14px;background:var(--bg3);margin-bottom:10px;border-left:4px solid var(--green)}
.w-card.summon{border-left-color:var(--purple);background:var(--purple-l)}
.w-card.bill{border-left-color:var(--blue)}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:10px 18px;border-radius:50px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#login-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.login-box{width:100%;max-width:360px;background:var(--bg3);border-radius:var(--radius-lg);border:1px solid var(--border);padding:28px 24px}
.login-logo{width:56px;height:56px;border-radius:14px;background:var(--amber);display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;margin:0 auto 14px}
.role-tile{background:var(--bg3);border-radius:var(--radius-lg);border:1px solid var(--border);padding:16px 12px;text-align:center;cursor:pointer;transition:all .15s}
.role-tile:hover,.role-tile:active{border-color:var(--amber);background:var(--amber-l)}
.role-tile i{font-size:28px;color:var(--amber);display:block;margin-bottom:6px}
.role-tile span{font-size:14px;font-weight:500}
.alert-banner{background:var(--amber-l);border:1px solid var(--amber-m);color:var(--amber-d);border-radius:var(--radius);padding:10px 14px;font-size:14px;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.alert-banner.green{background:var(--green-l);border-color:var(--green);color:var(--green)}
.alert-banner.blue{background:var(--blue-l);border-color:var(--blue);color:var(--blue)}
.alert-banner.purple{background:var(--purple-l);border-color:var(--purple);color:var(--purple)}
@keyframes pulse-blue{0%,100%{border-left-color:var(--blue)}50%{border-left-color:#5fa8f5}}
@keyframes pulse-purple{0%,100%{border-left-color:var(--purple)}50%{border-left-color:#9B97E0}}
@keyframes ring{0%,100%{transform:rotate(0)}20%{transform:rotate(-15deg)}40%{transform:rotate(15deg)}60%{transform:rotate(-10deg)}80%{transform:rotate(10deg)}}
@keyframes summon-pulse{0%,100%{box-shadow:0 0 0 0 rgba(83,74,183,.3)}50%{box-shadow:0 0 0 10px rgba(83,74,183,0)}}
@keyframes bell-ring{0%,100%{transform:rotate(0) scale(1)}15%{transform:rotate(-20deg) scale(1.1)}30%{transform:rotate(20deg) scale(1.1)}45%{transform:rotate(-15deg)}60%{transform:rotate(15deg)}75%{transform:rotate(-8deg)}90%{transform:rotate(0)}}
@keyframes summon-card-in{from{transform:translateY(-12px);opacity:0}to{transform:translateY(0);opacity:1}}
.ring-anim{animation:ring .5s 3}
.summon-anim{animation:summon-pulse 1.8s infinite}
.bell-ring{animation:bell-ring .8s ease-in-out}
.summon-card-new{animation:summon-card-in .35s ease-out}
/* floating summon button on customer menu */
.summon-fab{position:fixed;bottom:90px;right:16px;z-index:80;background:var(--purple);color:#fff;border:none;border-radius:50px;padding:11px 18px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:0 4px 16px rgba(83,74,183,.45);transition:transform .15s,box-shadow .15s;font-family:inherit}
.summon-fab:active{transform:scale(.95)}
.summon-fab i{font-size:20px}
.summon-fab.summoned{background:var(--green);box-shadow:0 4px 16px rgba(59,109,17,.4)}
/* waiter summon urgent badge */
.urgent-badge{display:inline-flex;align-items:center;gap:4px;background:var(--purple);color:#fff;border-radius:50px;padding:4px 10px;font-size:12px;font-weight:700;animation:summon-pulse 1.5s infinite}
.tabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;flex-shrink:0}
.tab{padding:7px 14px;border-radius:50px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit}
.tab.active{background:var(--amber-l);color:var(--amber-d);border-color:var(--amber-m)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.admin-row{display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg3);margin-bottom:8px}
.admin-row-thumb{width:52px;height:48px;border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
.admin-row-thumb img{width:100%;height:100%;object-fit:cover}
.admin-row-body{flex:1;min-width:0}
.admin-row-body p{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-row-body span{font-size:12px;color:var(--text2)}
/* waiter order builder */
.wi-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.wi-row:last-child{border-bottom:none}
.wi-thumb{width:38px;height:34px;border-radius:6px;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.wi-thumb img{width:100%;height:100%;object-fit:cover}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
@media(min-width:600px){
  .menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modal{border-radius:var(--radius-lg);max-width:480px;align-self:center;margin:auto}
  .modal-bg{align-items:center}
}
@media(min-width:900px){
  .menu-grid{grid-template-columns:1fr 1fr 1fr}
  .kitchen-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
}
</style>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-box">
    <div class="login-logo"><i class="ti ti-tools-kitchen-2"></i></div>
    <h1 style="font-size:20px;font-weight:700;text-align:center;margin-bottom:4px" id="login-shop-name">TableDine</h1>
    <p style="font-size:14px;color:var(--text2);text-align:center;margin-bottom:20px">Sign in to continue</p>
    <div class="form-group"><label class="form-label">Username</label><input type="text" id="login-user" placeholder="Enter username" autocomplete="username"></div>
    <div class="form-group"><label class="form-label">Password</label><input type="password" id="login-pass" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn btn-primary btn-full" onclick="doLogin()"><i class="ti ti-login"></i> Sign in</button>
    <p id="login-err" style="color:var(--red);font-size:13px;text-align:center;margin-top:10px;display:none">Incorrect credentials</p>
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);text-align:center">
      <button class="btn btn-sm" onclick="showTableSelect()" style="color:var(--text2)"><i class="ti ti-scan"></i> Customer? Scan QR at your table</button>
    </div>
  </div>
</div>

<!-- TABLE SELECT (customer) -->
<div id="table-select-page" style="display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg)">
  <div style="width:100%;max-width:380px">
    <div style="text-align:center;margin-bottom:24px">
      <div class="login-logo" style="margin-bottom:12px"><i class="ti ti-tools-kitchen-2"></i></div>
      <h2 id="ts-shop-name" style="font-size:18px;font-weight:700">TableDine</h2>
      <p style="font-size:14px;color:var(--text2);margin-top:4px">Tap your table number to start ordering</p>
    </div>
    <div id="table-tiles" class="grid3" style="margin-bottom:16px"></div>
    <button class="btn btn-full" onclick="hideTblSel()"><i class="ti ti-user-shield"></i> Staff login</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <!-- CUSTOMER -->
  <div class="page active" id="page-customer">
    <div class="topbar">
      <div class="topbar-logo"><i class="ti ti-tools-kitchen-2"></i></div>
      <h1 id="c-shop-name">TableDine</h1>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="badge badge-amber" id="c-table-badge">T1</span>
        <button class="btn btn-sm" onclick="openCart()" style="position:relative">
          <i class="ti ti-shopping-cart"></i>
          <span id="cart-count" style="display:none;position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;display:none;align-items:center;justify-content:center;font-weight:700;line-height:18px;text-align:center">0</span>
        </button>
      </div>
    </div>
    <div style="display:flex;gap:6px;padding:8px 14px;background:var(--bg3);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0" id="cat-bar"></div>
    <div class="scroll" id="menu-list"></div>
    <!-- Floating call waiter button -->
    <button class="summon-fab" id="summon-fab" onclick="summonWaiter()">
      <i class="ti ti-bell-ringing" id="summon-fab-icon"></i>
      <span id="summon-fab-label">Call waiter</span>
    </button>
    <div class="bottom-nav" id="customer-bnav">
      <button class="active" onclick="custTab('menu',this)"><i class="ti ti-menu-2"></i><span>Menu</span></button>
      <button onclick="custTab('myorders',this)"><i class="ti ti-receipt"></i><span>My Orders</span></button>
      <button onclick="custTab('bill',this)"><i class="ti ti-file-invoice"></i><span>Bill</span></button>
      <button onclick="summonWaiter()" id="summon-btn" style="color:var(--purple)"><i class="ti ti-bell-ringing"></i><span>Summon</span></button>
    </div>
  </div>

  <!-- CASHIER -->
  <div class="page" id="page-cashier">
    <div class="topbar"><div class="topbar-logo"><i class="ti ti-cash"></i></div><h1>Cashier</h1><button class="btn btn-sm" onclick="logout()"><i class="ti ti-logout"></i></button></div>
    <div class="tabs" style="padding:8px 14px 0"><button class="tab active" onclick="cTab('pending',this)">Orders <span id="cp-cnt" class="badge badge-amber" style="margin-left:2px">0</span></button><button class="tab" onclick="cTab('confirmed',this)">Confirmed</button><button class="tab" onclick="cTab('bill',this)">Bills <span id="cb-cnt" class="badge badge-blue" style="margin-left:2px">0</span></button><button class="tab" onclick="cTab('declined',this)">Declined</button></div>
    <div class="scroll" id="cashier-list"></div>
  </div>

  <!-- KITCHEN -->
  <div class="page" id="page-kitchen">
    <div class="topbar"><div class="topbar-logo"><i class="ti ti-chef-hat"></i></div><h1>Kitchen</h1><button class="btn btn-sm" onclick="logout()"><i class="ti ti-logout"></i></button></div>
    <div class="tabs" style="padding:8px 14px 0"><button class="tab active" onclick="kTab('queue',this)">Queue <span id="kq-cnt" class="badge badge-amber" style="margin-left:2px">0</span></button><button class="tab" onclick="kTab('ready',this)">Ready</button><button class="tab" onclick="kTab('done',this)">Done</button></div>
    <div class="scroll" id="kitchen-list"></div>
  </div>

  <!-- WAITER -->
  <div class="page" id="page-waiter">
    <div class="topbar"><div class="topbar-logo"><i class="ti ti-walk"></i></div><h1 id="waiter-title">Waiter</h1><button class="btn btn-sm" onclick="logout()"><i class="ti ti-logout"></i></button></div>
    <div class="tabs" style="padding:8px 14px 0">
      <button class="tab" onclick="wTab('alerts',this)">Alerts <span id="w-alert-cnt" class="badge badge-purple" style="margin-left:2px">0</span></button>
      <button class="tab" onclick="wTab('serve',this)">Serve <span id="w-serve-cnt" class="badge badge-green" style="margin-left:2px">0</span></button>
      <button class="tab" onclick="wTab('bills',this)">Bills <span id="w-bill-cnt" class="badge badge-blue" style="margin-left:2px">0</span></button>
      <button class="tab" onclick="wTab('order',this)" title="Add order or request bill for a table"><i class="ti ti-plus" style="font-size:12px"></i> Order/Bill</button>
      <button class="tab" onclick="wTab('done',this)">Done</button>
    </div>
    <div class="scroll" id="waiter-list"></div>
  </div>

  <!-- ADMIN -->
  <div class="page" id="page-admin">
    <div class="topbar"><div class="topbar-logo"><i class="ti ti-settings"></i></div><h1>Admin</h1><button class="btn btn-sm" onclick="logout()"><i class="ti ti-logout"></i></button></div>
    <div class="tabs" style="padding:8px 14px 0"><button class="tab active" onclick="aTab('dash',this)"><i class="ti ti-layout-dashboard"></i> Dash</button><button class="tab" onclick="aTab('menu',this)"><i class="ti ti-list"></i> Menu</button><button class="tab" onclick="aTab('cats',this)"><i class="ti ti-tags"></i> Cats</button><button class="tab" onclick="aTab('tables',this)"><i class="ti ti-table"></i> Tables</button><button class="tab" onclick="aTab('logins',this)"><i class="ti ti-users"></i> Logins</button><button class="tab" onclick="aTab('brand',this)"><i class="ti ti-paint"></i> Brand</button></div>
    <div class="scroll" id="admin-content"></div>
  </div>
</div>
<div id="modal-root"></div>

<script>
// ===== STATE =====
const DS = {
  shopName:'TableDine', shopBgColor:'#FAFAF8', shopBgImage:'',
  menuItems:[
    {id:1,name:'Vegetable Samosa',cat:'Starters',price:350,qty:12,desc:'Crispy pastry with spiced potato filling',image:'',ratings:[]},
    {id:2,name:'Chicken Soup',cat:'Starters',price:450,qty:8,desc:'Homestyle chicken broth with herbs',image:'',ratings:[]},
    {id:3,name:'Butter Chicken',cat:'Mains',price:1450,qty:10,desc:'Tender chicken in rich tomato-butter sauce',image:'',ratings:[]},
    {id:4,name:'Grilled Sea Bass',cat:'Mains',price:1950,qty:3,desc:'Fresh local sea bass with lemon butter',image:'',ratings:[]},

function renderCustMenu(){
  const el=document.getElementById('menu-list');
  applyBrand();
  const items=_catF?S.menuItems.filter(m=>m.cat===_catF):S.menuItems;
  if(!items.length){ el.innerHTML='<div class="empty-state" style="color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.4)"><i class="ti ti-basket-off" style="font-size:44px;display:block;margin-bottom:10px;opacity:.5"></i><p>No items</p></div>'; return; }
  const cats=[...new Set(items.map(m=>m.cat))];
  let h='';
  cats.forEach(cat=>{
    const ci=items.filter(m=>m.cat===cat); if(!ci.length) return;
    h+=`<p class="section-label" style="background:rgba(255,255,255,.7);display:inline-block;padding:2px 8px;border-radius:6px">${cat}</p><div class="menu-grid">`;
    ci.forEach(item=>{
      const inCart=cart.find(c=>c.id===item.id);
      const cqty=inCart?inCart.qty:0;
      const low=item.qty>0&&item.qty<5, out=item.qty===0;
      const avg=item.ratings.length?(item.ratings.reduce((s,r)=>s+r,0)/item.ratings.length):0;
      h+=`<div class="menu-card">`;
      if(item.image) h+=`<img class="menu-card-img" src="${item.image}" alt="${item.name}" loading="lazy">`;
      else h+=`<div class="menu-card-img-ph"><i class="ti ti-tools-kitchen-2" style="font-size:36px;color:var(--text3)"></i></div>`;
      h+=`<div class="menu-card-body">
        <p style="font-weight:600;font-size:15px">${item.name}</p>
        <p style="font-size:13px;color:var(--text2);margin-top:2px;line-height:1.4">${item.desc}</p>
        <div style="display:flex;align-items:center;gap:5px;margin-top:5px">${starsHtml(avg)}<span style="font-size:11px;color:var(--text3)">${item.ratings.length?'('+item.ratings.length+')':'No ratings'}</span></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
          <span style="font-weight:700;font-size:15px;color:var(--amber-d)">Rs.${item.price.toLocaleString()}</span>
          ${low?`<span style="font-size:11px;color:var(--amber-d);font-weight:600">⚠ ${item.qty} left</span>`:''}
        </div>
        ${out?`<button class="btn btn-sm btn-full" style="margin-top:8px;opacity:.45" disabled>Out of stock</button>`:
          cqty===0?`<button class="btn btn-primary btn-sm btn-full" style="margin-top:8px" onclick="addCart(${item.id})"><i class="ti ti-plus"></i> Add</button>`:
          `<div class="qty-ctrl" style="margin-top:8px"><button onclick="chQty(${item.id},-1)">−</button><span>${cqty}</span><button onclick="chQty(${item.id},1)">+</button></div>`}
        <button class="btn btn-sm btn-full" style="margin-top:6px;font-size:12px;color:var(--text2)" onclick="openRateModal(${item.id})">⭐ Rate this item</button>
      </div></div>`;
    });
    h+='</div>';
  });
  el.innerHTML=h;
}
function starsHtml(avg){
  let h='<span class="stars-display">';
  for(let i=1;i<=5;i++) h+=`<span class="star ${i<=Math.round(avg)?'filled':''}">★</span>`;
  return h+'</span>';
}
function openRateModal(itemId){
  const item=S.menuItems.find(m=>m.id===itemId);
  showModal(`<div class="modal-top"><p class="modal-title" style="margin:0">Rate ${item.name}</p><button class="btn btn-sm" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <p style="font-size:14px;color:var(--text2);margin-bottom:16px">How was this dish?</p>
    <div class="stars" id="rate-stars" style="font-size:40px;justify-content:center;display:flex;gap:8px">
      ${[1,2,3,4,5].map(i=>`<span class="star" onclick="setRating(${i},${itemId})" onmouseover="hoverStar(${i})" onmouseout="unhoverStar()">★</span>`).join('')}
    </div>
    <p id="rate-lbl" style="text-align:center;font-size:14px;color:var(--text2);margin-top:12px">Tap a star to rate</p>`);
}
function hoverStar(n){ document.querySelectorAll('#rate-stars .star').forEach((s,i)=>s.classList.toggle('filled',i<n)); }
function unhoverStar(){ document.querySelectorAll('#rate-stars .star').forEach(s=>s.classList.remove('filled')); }
function setRating(n,id){ const item=S.menuItems.find(m=>m.id===id); item.ratings.push(n); save(); closeModal(); toast('Thanks for rating! ⭐'); renderCustMenu(); }
function addCart(id){
  const item=S.menuItems.find(m=>m.id===id); if(!item||item.qty===0) return;
  const ex=cart.find(c=>c.id===id);
  if(ex) ex.qty++; else cart.push({id,name:item.name,price:item.price,qty:1,image:item.image||''});
  updateCartBadge(); renderCustMenu();
}
function chQty(id,d){
  const idx=cart.findIndex(c=>c.id===id); if(idx<0) return;
  cart[idx].qty+=d; if(cart[idx].qty<=0) cart.splice(idx,1);
  updateCartBadge(); renderCustMenu();
  const ci=document.getElementById('cart-items-inner'); if(ci) ci.innerHTML=cartItemsHtml();
}
function updateCartBadge(){
  const n=cart.reduce((s,c)=>s+c.qty,0);
  const el=document.getElementById('cart-count');
  if(el){ el.textContent=n; el.style.display=n>0?'inline-block':'none'; }
}
function openCart(){ showModal(cartModalHtml()); }
function cartModalHtml(){
  const tot=cart.reduce((s,c)=>s+c.qty*c.price,0);
  return `<div class="modal-top"><p class="modal-title" style="margin:0">Your order — ${table}</p><button class="btn btn-sm" onclick="closeModal()"><i class="ti ti-x"></i></button></div>

    </div>
    <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;font-weight:700;font-size:16px;margin-bottom:12px"><span>Total</span><span style="color:var(--amber-d)">Rs.${tot.toLocaleString()}</span></div>
      <button class="btn btn-primary btn-full" onclick="placeOrder()" ${cart.length===0?'disabled':''}>
        <i class="ti ti-send"></i> Place order
      </button>
    </div>`;
}
function cartItemsHtml(){
  if(!cart.length) return `<div class="empty-state" style="padding:20px 0"><i class="ti ti-shopping-cart-off" style="font-size:36px;display:block;margin-bottom:8px;opacity:.4"></i><p style="font-size:14px;color:var(--text3)">Cart is empty</p></div>`;
  return cart.map(c=>`<div class="order-row">
    <div style="display:flex;gap:10px;align-items:center">
      <div class="wi-thumb">${c.image?`<img src="${c.image}">`:`<i class="ti ti-tools-kitchen-2" style="color:var(--text3)"></i>`}</div>
      <div><p style="font-size:14px;font-weight:500">${c.name}</p><p style="font-size:12px;color:var(--text2)">Rs.${c.price.toLocaleString()}</p></div>
    </div>
    <div class="qty-ctrl"><button onclick="chQty(${c.id},-1)">−</button><span>${c.qty}</span><button onclick="chQty(${c.id},1)">+</button></div>
  </div>`).join('');
}
function toggleTag(el,tag){
  el.classList.toggle('sel');
  if(selTags.includes(tag)) selTags=selTags.filter(t=>t!==tag); else selTags.push(tag);
}
function placeOrder(){
  if(!cart.length) return;
  const noteEl=document.getElementById('order-note');
  const note=(selTags.join(', ')+(noteEl&&noteEl.value?' · '+noteEl.value:'')).replace(/^[, ]+/,'').replace(/^ · /,'');
  const order=mkOrder(table, JSON.parse(JSON.stringify(cart)), note, 'customer');
  S.orders.push(order);
  cart=[]; selTags=[]; save(); closeModal(); updateCartBadge();
  showSuccessModal();
}
function mkOrder(tbl, items, note, source){
  return {
    id:S.nextOrderId++, table:tbl, items, note:note||'',
    total:items.reduce((s,c)=>s+c.qty*c.price,0),
    status:'pending', kitchenStatus:'queued',
    waiterStatus:null, billStatus:null, waiterBillStatus:null, prepTime:null,
    source:source||'customer',
    time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}), ts:Date.now()
  };
}
function showSuccessModal(){
  showModal(`<div style="text-align:center;padding:20px 4px">
    <i class="ti ti-circle-check" style="font-size:52px;color:var(--green);display:block;margin-bottom:12px"></i>
    <p style="font-size:19px;font-weight:700;margin-bottom:6px">Order placed!</p>

  </div>`);
}
function renderMyOrders(){

      <span style="font-weight:700;color:var(--amber-d)">Rs.${o.total.toLocaleString()}</span>
      <span class="badge ${o.kitchenStatus==='served'?'badge-green':o.kitchenStatus==='ready'?'badge-blue':'badge-gray'}">${o.kitchenStatus||'—'}</span>
    </div>

function renderBillTab(){
  const el=document.getElementById('menu-list');
  const myO=S.orders.filter(o=>o.table===table&&o.status==='confirmed');
  const total=myO.reduce((s,o)=>s+o.total,0);
  const alreadyReq=myO.some(o=>o.billStatus==='requested');
  const billReady=myO.some(o=>o.billStatus==='ready');
  let h=`<div class="card card-pad" style="margin-bottom:12px">
    <p style="font-weight:600;font-size:16px;margin-bottom:4px">Table ${table}</p>

    ${myO.map(o=>`<div style="display:flex;justify-content:space-between;font-size:14px;padding:4px 0;border-bottom:1px solid var(--border)"><span>#${o.id}</span><span>Rs.${o.total.toLocaleString()}</span></div>`).join('')}
    <div style="display:flex;justify-content:space-between;font-weight:700;font-size:16px;margin-top:10px"><span>Total due</span><span style="color:var(--amber-d)">Rs.${total.toLocaleString()}</span></div>
  </div>`;
  if(billReady) h+=`<div class="alert-banner green"><i class="ti ti-check"></i> Your bill is ready! A waiter is bringing it to you.</div>`;
  else if(alreadyReq) h+=`<div class="alert-banner"><i class="ti ti-clock"></i> Bill requested — cashier is processing it.</div>`;
  else h+=`<button class="btn btn-primary btn-full" onclick="custReqBill()" ${myO.length===0?'disabled':''}><i class="ti ti-file-invoice"></i> Request bill</button>`;
  el.innerHTML=h;
}
function custReqBill(){
  const myO=S.orders.filter(o=>o.table===table&&o.status==='confirmed');
  if(!myO.length) return;
  myO.forEach(o=>{ if(!o.billStatus) o.billStatus='requested'; });
  save(); renderBillTab(); toast('Bill requested 🧾'); playBell();
}
// SUMMON WAITER
function summonWaiter(){
  const existing=S.summons.find(s=>s.table===table&&s.status==='active');
  if(existing){ toast('Waiter already notified! Please wait. 🔔'); return; }
  S.summons.push({ id:Date.now(), table, ts:Date.now(), status:'active', acceptedBy:null });
  save();
  toast('Waiter called! 🔔 Someone will be with you shortly.');
  playBell();
  // Update FAB to show "called" state
  const fab=document.getElementById('summon-fab');
  const fabIcon=document.getElementById('summon-fab-icon');
  const fabLabel=document.getElementById('summon-fab-label');
  if(fab){ fab.classList.add('summoned'); fab.onclick=null; }
  if(fabIcon){ fabIcon.className='ti ti-check'; }
  if(fabLabel){ fabLabel.textContent='Waiter called!'; }
}
function updateSummonFab(){
  const fab=document.getElementById('summon-fab');
  const fabIcon=document.getElementById('summon-fab-icon');
  const fabLabel=document.getElementById('summon-fab-label');
  if(!fab) return;
  const active=S.summons.find(s=>s.table===table&&s.status==='active');
  if(active){
    fab.classList.add('summoned'); fab.onclick=null;
    if(fabIcon) fabIcon.className='ti ti-check';
    if(fabLabel) fabLabel.textContent='Waiter called!';
  } else {
    fab.classList.remove('summoned'); fab.onclick=summonWaiter;
    if(fabIcon) fabIcon.className='ti ti-bell-ringing';
    if(fabLabel) fabLabel.textContent='Call waiter';
  }
}

      <div style="text-align:right">
        <p style="font-size:12px;color:var(--text2)">${o.time}</p>
        <p style="font-weight:700;color:var(--amber-d)">Rs.${o.total.toLocaleString()}</p>
      </div>
    </div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:8px">${o.items.map(i=>`${i.name} ×${i.qty}`).join(' · ')}</p>
    ${o.note?`<p style="font-size:12px;background:var(--amber-l);color:var(--amber-d);padding:4px 8px;border-radius:6px;margin-bottom:8px">📝 ${o.note}</p>`:''}
    ${o.status==='pending'?`
      <div style="margin-bottom:8px">
        <label class="form-label" style="font-size:12px">Approx. prep time</label>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${[5,10,15,20,30].map(t=>`<button class="btn btn-sm ${o.prepTime===t?'btn-primary':''}" onclick="setPrepTime(${o.id},${t})">${t}m</button>`).join('')}</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-success btn-sm" style="flex:1" onclick="confirmOrder(${o.id})"><i class="ti ti-check"></i> Confirm</button>
        <button class="btn btn-danger btn-sm" style="flex:1" onclick="declineOrder(${o.id})"><i class="ti ti-x"></i> Decline</button>
      </div>`:
    o.billStatus==='requested'?`<button class="btn btn-primary btn-sm btn-full" onclick="markBillReady(${o.id})"><i class="ti ti-receipt"></i> Mark bill ready</button>`:
    `<span class="badge ${o.status==='confirmed'?'badge-green':'badge-red'}">${o.status==='confirmed'?'✓ Confirmed':'✗ Declined'}</span>`}
  </div>`).join('');
}
function setPrepTime(id,t){
  const o=S.orders.find(o=>o.id===id); if(o) o.prepTime=t; save(); renderCashier();
}
function confirmOrder(id){
  const o=S.orders.find(o=>o.id===id);
  if(o){ o.status='confirmed'; o.kitchenStatus='queued'; }
  save(); renderCashier();
}
function declineOrder(id){
  const o=S.orders.find(o=>o.id===id); if(o) o.status='declined'; save(); renderCashier();
}
function markBillReady(id){
  const o=S.orders.find(o=>o.id===id);
  if(!o) return;
  S.orders.filter(ord=>ord.table===o.table&&ord.billStatus==='requested').forEach(ord=>ord.billStatus='ready');
  save(); renderCashier(); toast('Bill ready — notifying waiters 🔔'); playBell();
}

// ===== KITCHEN =====
let _kTabState='queue';
function kTab(t,btn){
  _kTabState=t;
  document.querySelectorAll('#page-kitchen .tabs .tab').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderKitchen();
}
function renderKitchen(){
  const qcnt=S.orders.filter(o=>o.status==='confirmed'&&o.kitchenStatus==='queued').length;
  document.getElementById('kq-cnt').textContent=qcnt;
  let list;
  if(_kTabState==='queue') list=S.orders.filter(o=>o.status==='confirmed'&&o.kitchenStatus==='queued').sort((a,b)=>a.ts-b.ts);
  else if(_kTabState==='ready') list=S.orders.filter(o=>o.kitchenStatus==='ready').sort((a,b)=>a.ts-b.ts);
  else list=S.orders.filter(o=>o.kitchenStatus==='served').sort((a,b)=>b.ts-a.ts).slice(0,30);
  const el=document.getElementById('kitchen-list');
  if(!list.length){ el.innerHTML='<div class="empty-state"><i class="ti ti-chef-hat" style="font-size:40px;display:block;margin-bottom:8px;opacity:.4"></i><p style="color:var(--text3)">Nothing here</p></div>'; return; }
  el.innerHTML=`<div class="kitchen-grid">${list.map(o=>`<div class="kitchen-card ${_kTabState==='done'?'served':_kTabState==='ready'?'ready':''}">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px;align-items:flex-start">
      <div><span style="font-size:20px;font-weight:700">Table ${o.table}</span> <span class="badge badge-gray">#${o.id}</span>${o.source==='waiter'?` <span class="badge badge-purple">waiter</span>`:''}</div>
      <div style="text-align:right"><span style="font-size:12px;color:var(--text2)">${o.time}</span>${o.prepTime?`<p style="font-size:12px;color:var(--green);font-weight:600">⏱ ${o.prepTime}m</p>`:''}</div>
    </div>
    <div style="margin-bottom:10px">${o.items.map(i=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:14px"><span style="font-weight:500">${i.name}</span><span class="badge badge-amber">×${i.qty}</span></div>`).join('')}</div>
    ${o.note?`<p style="font-size:12px;background:var(--amber-l);color:var(--amber-d);padding:5px 8px;border-radius:6px;margin-bottom:8px">📝 ${o.note}</p>`:''}
    ${_kTabState==='queue'?`<button class="btn btn-primary btn-sm btn-full" onclick="kitchenReady(${o.id})"><i class="ti ti-check"></i> Mark ready</button>`:
    _kTabState==='ready'?`<button class="btn btn-success btn-sm btn-full" onclick="kitchenServed(${o.id})"><i class="ti ti-check"></i> Notify waiter</button>`:
    `<span class="badge badge-green">✓ Served</span>`}
  </div>`).join('')}</div>`;
}
function kitchenReady(id){
  const o=S.orders.find(o=>o.id===id);
  if(o){ o.kitchenStatus='ready'; o.waiterStatus='pending'; }
  save(); renderKitchen(); toast('Order ready — waiter notified 🔔');
}
function kitchenServed(id){
  const o=S.orders.find(o=>o.id===id);
  if(o){ o.kitchenStatus='served'; o.waiterStatus='pending'; }
  save(); renderKitchen();
}

// ===== WAITER =====
let _wTabState='alerts';
function wTab(t,btn){
  _wTabState=t;
  document.querySelectorAll('#page-waiter .tabs .tab').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else {
    // Find by data or index
    const tabs=document.querySelectorAll('#page-waiter .tabs .tab');
    const map={alerts:0,serve:1,bills:2,order:3,done:4};
    if(tabs[map[t]]) tabs[map[t]].classList.add('active');
  }
  if(t==='order') renderWaiterOrderBuilder();
  else renderWaiter();
}
let _lastSummonCount=0;
function wBadges(){
  const alerts=S.summons.filter(s=>s.status==='active').length;
  const serve=S.orders.filter(o=>o.waiterStatus==='pending'&&(o.kitchenStatus==='served'||o.kitchenStatus==='ready')).length;
  const bills=S.orders.filter(o=>o.billStatus==='ready'&&o.waiterBillStatus!=='accepted').length;
  document.getElementById('w-alert-cnt').textContent=alerts;
  document.getElementById('w-serve-cnt').textContent=serve;
  document.getElementById('w-bill-cnt').textContent=bills;
  // Ring if new summons arrived
  if(alerts > _lastSummonCount && _lastSummonCount>=0){ playBell(); }
  _lastSummonCount=alerts;
}
function renderWaiter(){
  wBadges();
  const el=document.getElementById('waiter-list');
  let html='';
  if(_wTabState==='alerts'){
    const summons=S.summons.filter(s=>s.status==='active').sort((a,b)=>a.ts-b.ts);
    if(!summons.length){ el.innerHTML='<div class="empty-state"><i class="ti ti-bell-off" style="font-size:40px;display:block;margin-bottom:8px;opacity:.4"></i><p style="color:var(--text3)">No calls right now</p></div>'; return; }
    html=`<div class="alert-banner purple" style="margin-bottom:12px"><i class="ti ti-bell-ringing bell-ring"></i> ${summons.length} table${summons.length>1?'s are':'is'} calling for a waiter</div>`;
    html+=summons.map(s=>`<div class="w-card summon summon-anim summon-card-new" style="border:2px solid var(--purple);padding:16px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:48px;height:48px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <i class="ti ti-bell-ringing bell-ring" style="font-size:24px;color:#fff"></i>
          </div>
          <div>
            <p style="font-size:22px;font-weight:800;color:var(--purple);line-height:1">Table ${s.table}</p>
            <p style="font-size:12px;color:var(--text2);margin-top:2px">${new Date(s.ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</p>
          </div>
        </div>
        <span class="urgent-badge"><i class="ti ti-urgent"></i> Needs help</span>
      </div>
      <div style="background:var(--purple-l);border-radius:var(--radius);padding:10px 12px;margin-bottom:12px;border-left:3px solid var(--purple)">
        <p style="font-size:14px;color:var(--purple);font-weight:500">💬 "Need your help at Table ${s.table} please!"</p>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" style="flex:1;border-color:var(--purple);color:var(--purple)" onclick="goToWaiterOrder('${s.table}')">
          <i class="ti ti-clipboard-plus"></i> Take order
        </button>
        <button class="btn btn-purple btn-sm" style="flex:1" onclick="dismissSummon(${s.id})">
          <i class="ti ti-walk"></i> On my way — dismiss
        </button>
      </div>
    </div>`).join('');
  } else if(_wTabState==='serve'){
    const orders=S.orders.filter(o=>o.waiterStatus==='pending'&&(o.kitchenStatus==='served'||o.kitchenStatus==='ready')).sort((a,b)=>a.ts-b.ts);
    if(!orders.length){ el.innerHTML='<div class="empty-state"><i class="ti ti-walk" style="font-size:40px;display:block;margin-bottom:8px;opacity:.4"></i><p style="color:var(--text3)">No orders ready to serve</p></div>'; return; }
    html=orders.map(o=>`<div class="w-card">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <div><span style="font-size:18px;font-weight:700">Table ${o.table}</span> <span class="badge badge-green">Ready</span></div>
        <span style="font-size:12px;color:var(--text2)">#${o.id}</span>
      </div>
      <div style="font-size:14px;margin-bottom:10px">${o.items.map(i=>`<div style="padding:2px 0">${i.name} <span style="color:var(--text2)">×${i.qty}</span></div>`).join('')}</div>
      ${o.note?`<p style="font-size:12px;background:var(--amber-l);color:var(--amber-d);padding:4px 8px;border-radius:6px;margin-bottom:8px">📝 ${o.note}</p>`:''}
      <button class="btn btn-success btn-sm btn-full" onclick="acceptServe(${o.id})"><i class="ti ti-check"></i> Accept & serve this table</button>
    </div>`).join('');
  } else if(_wTabState==='bills'){
    const bills=S.orders.filter(o=>o.billStatus==='ready'&&o.waiterBillStatus!=='accepted').sort((a,b)=>a.ts-b.ts);
    if(!bills.length){ el.innerHTML='<div class="empty-state"><i class="ti ti-file-invoice" style="font-size:40px;display:block;margin-bottom:8px;opacity:.4"></i><p style="color:var(--text3)">No bills to deliver</p></div>'; return; }
    html=bills.map(o=>`<div class="w-card bill">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <div><span style="font-size:18px;font-weight:700">Table ${o.table}</span> <span class="badge badge-blue">Bill ready</span></div>
        <span style="font-weight:700;color:var(--amber-d)">Rs.${o.total.toLocaleString()}</span>
      </div>
      <button class="btn btn-primary btn-sm btn-full" onclick="acceptBill(${o.id})"><i class="ti ti-walk"></i> Take bill to table</button>
    </div>`).join('');
  } else if(_wTabState==='done'){
    const done=S.orders.filter(o=>o.waiterStatus==='done'||o.waiterBillStatus==='accepted').sort((a,b)=>b.ts-a.ts).slice(0,30);
    if(!done.length){ el.innerHTML='<div class="empty-state"><i class="ti ti-circle-check" style="font-size:40px;display:block;margin-bottom:8px;opacity:.4"></i><p style="color:var(--text3)">No completed tasks</p></div>'; return; }
    html=done.map(o=>`<div class="w-card" style="border-left-color:var(--text3);opacity:.7">
      <div style="display:flex;justify-content:space-between"><span style="font-weight:600">Table ${o.table} — #${o.id}</span>
      <span class="badge badge-gray">${o.waiterBillStatus==='accepted'?'Bill delivered':'Served'}</span></div>
    </div>`).join('');
  }
  el.innerHTML=html;
}
function dismissSummon(id){
  const s=S.summons.find(x=>x.id===id);
  if(s){ s.status='dismissed'; s.acceptedBy=user; }
  save(); renderWaiter(); toast('Heading to Table '+s.table+' 🚶 Summon dismissed.');
}
function goToWaiterOrder(tbl){
  wCartTable=tbl; wCart=[]; wCartEditId=null;
  wTab('order', null);
}
function acceptServe(id){
  const o=S.orders.find(o=>o.id===id); if(o) o.waiterStatus='done'; save(); renderWaiter(); toast('Serving Table '+o.table);
}
function acceptBill(id){
  const o=S.orders.find(o=>o.id===id); if(o) o.waiterBillStatus='accepted'; save(); renderWaiter(); toast('Taking bill to Table '+o.table);
}

// ===== WAITER ORDER BUILDER =====
function renderWaiterOrderBuilder(){
  const el=document.getElementById('waiter-list');
  // Check if editing an existing order
  const editOrder=wCartEditId?S.orders.find(o=>o.id===wCartEditId):null;
  if(!wCartTable && editOrder) wCartTable=editOrder.table;
  const cats=[...new Set(S.menuItems.map(m=>m.cat))];
  let h=`<div style="margin-bottom:12px">
    <label class="form-label">Table</label>
    <select id="w-table-sel" onchange="wCartTable=this.value;renderWaiterOrderBuilder()" style="margin-bottom:0">
      <option value="">— Select table —</option>
      ${S.tables.map(t=>`<option value="${t}" ${wCartTable===t?'selected':''}>${t}</option>`).join('')}
    </select>
  </div>`;
  if(wCartTable){
    // existing orders for this table
    const tOrders=S.orders.filter(o=>o.table===wCartTable&&o.status!=='declined').sort((a,b)=>b.ts-a.ts);
    if(tOrders.length){
      h+=`<p class="section-label">Existing orders for ${wCartTable}</p>`;
      h+=tOrders.map(o=>`<div class="o-card ${o.status}" style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><span style="font-weight:600">#${o.id}</span> <span class="badge ${o.status==='pending'?'badge-amber':o.status==='confirmed'?'badge-green':'badge-red'}">${o.status}</span></div>
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:13px;color:var(--amber-d);font-weight:600">Rs.${o.total.toLocaleString()}</span>
            ${o.status==='pending'?`<button class="btn btn-sm" onclick="waiterEditOrder(${o.id})" title="Edit this order"><i class="ti ti-edit"></i></button>`:''}
          </div>
        </div>
        <p style="font-size:12px;color:var(--text2);margin-top:4px">${o.items.map(i=>`${i.name} ×${i.qty}`).join(' · ')}</p>
      </div>`).join('');
    }
    // Bill request button for waiter
    const confirmed=S.orders.filter(o=>o.table===wCartTable&&o.status==='confirmed');
    const alrBill=confirmed.some(o=>['requested','ready'].includes(o.billStatus));
    if(confirmed.length){
      h+=`<div style="margin-bottom:12px">`;
      if(!alrBill) h+=`<button class="btn btn-full" style="border-color:var(--blue);color:var(--blue)" onclick="waiterReqBill('${wCartTable}')"><i class="ti ti-file-invoice"></i> Request bill for ${wCartTable}</button>`;
      else h+=`<div class="alert-banner blue"><i class="ti ti-check"></i> Bill already requested for ${wCartTable}</div>`;
      h+=`</div>`;
    }
    // Cart for new/edit order
    h+=`<p class="section-label">${wCartEditId?'Editing order #'+wCartEditId+' — modify items below':'New order for '+wCartTable}</p>`;
    if(wCartEditId){
      h+=`<div class="alert-banner" style="margin-bottom:10px"><i class="ti ti-edit"></i> Editing order #${wCartEditId}. Changes replace the current order.</div>`;
    }
    h+=`<div id="w-cart-display">${wCartHtml()}</div>`;
    // Menu items
    h+=`<p class="section-label">Add from menu</p>`;
    cats.forEach(cat=>{
      const ci=S.menuItems.filter(m=>m.cat===cat);
      h+=`<p style="font-size:12px;font-weight:600;color:var(--text2);margin:10px 0 6px">${cat}</p>`;
      ci.forEach(item=>{
        const inW=wCart.find(c=>c.id===item.id);
        const wqty=inW?inW.qty:0;
        h+=`<div class="wi-row">
          <div class="wi-thumb">${item.image?`<img src="${item.image}" alt="">`:`<i class="ti ti-tools-kitchen-2" style="color:var(--text3)"></i>`}</div>
          <div style="flex:1;min-width:0">
            <p style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.name}</p>
            <p style="font-size:12px;color:var(--text2)">Rs.${item.price.toLocaleString()}</p>
          </div>
          ${item.qty===0?`<span style="font-size:12px;color:var(--red)">Out</span>`:
          wqty===0?`<button class="btn btn-sm btn-primary" onclick="wAddItem(${item.id})"><i class="ti ti-plus"></i></button>`:
          `<div class="qty-ctrl" style="transform:scale(.85);transform-origin:right"><button onclick="wChQty(${item.id},-1)">−</button><span>${wqty}</span><button onclick="wChQty(${item.id},1)">+</button></div>`}
        </div>`;
      });
    });
    // Note + submit
    h+=`<div style="margin-top:14px">
      <label class="form-label">Note / special requests</label>
      <textarea id="w-note" rows="2" placeholder="e.g. no spice, extra portions...">${wCartEditId?(S.orders.find(o=>o.id===wCartEditId)||{}).note||'':''}</textarea>
    </div>
    <div style="display:flex;gap:8px;margin-top:10px">
      ${wCartEditId?`<button class="btn btn-danger btn-sm" style="flex:1" onclick="cancelWaiterEdit()"><i class="ti ti-x"></i> Cancel edit</button>`:''}
      <button class="btn btn-primary btn-full" onclick="waiterSubmitOrder()" ${wCart.length===0?'disabled':''}><i class="ti ti-send"></i> ${wCartEditId?'Save changes':'Submit order'}</button>
    </div>`;
  }
  el.innerHTML=h;
}
function wCartHtml(){
  if(!wCart.length) return `<p style="font-size:13px;color:var(--text3);padding:8px 0">No items added yet</p>`;
  const tot=wCart.reduce((s,c)=>s+c.qty*c.price,0);
  return `<div style="background:var(--bg2);border-radius:var(--radius);padding:10px;margin-bottom:4px">
    ${wCart.map(c=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0">
      <span style="font-size:13px">${c.name} ×${c.qty}</span>
      <span style="font-size:13px;color:var(--amber-d);font-weight:600">Rs.${(c.qty*c.price).toLocaleString()}</span>
    </div>`).join('')}
    <div style="border-top:1px solid var(--border);margin-top:6px;padding-top:6px;display:flex;justify-content:space-between;font-weight:700">
      <span>Total</span><span style="color:var(--amber-d)">Rs.${tot.toLocaleString()}</span>
    </div>
  </div>`;
}
function wAddItem(id){
  const item=S.menuItems.find(m=>m.id===id); if(!item) return;
  const ex=wCart.find(c=>c.id===id);
  if(ex) ex.qty++; else wCart.push({id,name:item.name,price:item.price,qty:1,image:item.image||''});
  renderWaiterOrderBuilder();
}
function wChQty(id,d){
  const idx=wCart.findIndex(c=>c.id===id); if(idx<0) return;
  wCart[idx].qty+=d; if(wCart[idx].qty<=0) wCart.splice(idx,1);
  renderWaiterOrderBuilder();
}
function waiterEditOrder(id){
  const o=S.orders.find(o=>o.id===id); if(!o) return;
  wCartEditId=id;
  wCartTable=o.table;
  wCart=JSON.parse(JSON.stringify(o.items));
  renderWaiterOrderBuilder();
  toast('Editing order #'+id+' — make changes below');
}
function cancelWaiterEdit(){
  wCartEditId=null; wCart=[];
  renderWaiterOrderBuilder();
}
function waiterSubmitOrder(){
  if(!wCartTable||!wCart.length) return;
  const noteEl=document.getElementById('w-note');
  const note=noteEl?noteEl.value.trim():'';
  if(wCartEditId){
    // Replace the order
    const o=S.orders.find(o=>o.id===wCartEditId);
    if(o){
      o.items=JSON.parse(JSON.stringify(wCart));
      o.note=note;
      o.total=wCart.reduce((s,c)=>s+c.qty*c.price,0);
      o.source='waiter';
    }
    toast('Order #'+wCartEditId+' updated ✓');
    wCartEditId=null;
  } else {
    const order=mkOrder(wCartTable, JSON.parse(JSON.stringify(wCart)), note, 'waiter');
    S.orders.push(order);
    toast('Order placed for '+wCartTable+' 🍽');
  }
  wCart=[]; save();
  renderWaiterOrderBuilder();
}
function waiterReqBill(tbl){
  const confirmed=S.orders.filter(o=>o.table===tbl&&o.status==='confirmed');
  if(!confirmed.length){ toast('No confirmed orders for '+tbl); return; }
  confirmed.forEach(o=>{ if(!o.billStatus) o.billStatus='requested'; });
  save(); renderWaiterOrderBuilder(); toast('Bill requested for '+tbl+' 🧾'); playBell();
}

function aTab(t,btn){

}

    ${S.orders.length===0?'<div class="empty-state"><i class="ti ti-receipt-off" style="font-size:40px;display:block;margin-bottom:8px;opacity:.4"></i><p style="color:var(--text3)">No orders yet</p></div>':

function genQR(tableId){
  const sz=90,cs=5,n=17;
  const seed=tableId.split('').reduce((a,c)=>a+c.charCodeAt(0)*37,0);
  let cells='';
  function isFinder(r,c){ return (r<7&&c<7)||(r<7&&c>=n-7)||(r>=n-7&&c<7); }
  function finderCell(r,c,pr,pc){ const lr=r-pr,lc=c-pc; return(lr===0||lr===6||lc===0||lc===6)||(lr>=2&&lr<=4&&lc>=2&&lc<=4); }
  for(let r=0;r<n;r++) for(let c=0;c<n;c++){
    let filled=false;
    if(r<7&&c<7) filled=finderCell(r,c,0,0);
    else if(r<7&&c>=n-7) filled=finderCell(r,c,0,n-7);
    else if(r>=n-7&&c<7) filled=finderCell(r,c,n-7,0);
    else{ const h2=(seed*r*13+c*29+r*c)%97; filled=h2<52; }
    if(filled) cells+=`<rect x="${c*cs+4}" y="${r*cs+4}" width="${cs-.5}" height="${cs-.5}" rx=".5"/>`;
  }
  const tw=tableId.length>2?9:12;
  const lw=tableId.length*tw+12;
  return `<svg width="${sz}" height="${sz+20}" viewBox="0 0 ${sz} ${sz+20}" xmlns="http://www.w3.org/2000/svg" style="background:#fff;border-radius:6px">
    <rect width="${sz}" height="${sz+20}" fill="#fff" rx="6"/>
    <g fill="#111">${cells}</g>
    <rect x="${sz/2-lw/2}" y="${sz-1}" width="${lw}" height="18" fill="#fff" rx="3"/>
    <text x="${sz/2}" y="${sz+13}" font-size="11" font-weight="700" fill="#111" text-anchor="middle" font-family="-apple-system,sans-serif">${tableId}</text>
  </svg>`;
}

// ===== UTILS =====
function showModal(inner){
  document.getElementById('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><div class="modal-handle"></div>${inner}</div></div>`;

function closeModal(){ document.getElementById('modal-root').innerHTML=''; _pendingImg=null; }
function toast(msg,dur=2800){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.opacity='1';
  clearTimeout(el._t); el._t=setTimeout(()=>el.style.opacity='0',dur);
}
function playBell(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[880,.5,0,0.8],[1100,.4,0.3,0.6],[1320,.3,0.6,0.5]].forEach(([f,g,d,dur])=>{
      const o=ctx.createOscillator(),gn=ctx.createGain();
      o.connect(gn); gn.connect(ctx.destination);
      o.frequency.value=f; o.type='sine';
      gn.gain.setValueAtTime(g,ctx.currentTime+d);
      gn.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+dur);
      o.start(ctx.currentTime+d); o.stop(ctx.currentTime+d+dur);
    });
  }catch(e){}
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
